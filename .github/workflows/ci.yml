name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: python -m pip install -e ".[dev]"
        working-directory: backend
      - run: ruff check app tests
        working-directory: backend
      - run: mypy app tests
        working-directory: backend
      - run: pytest --junitxml=test-results.xml
        working-directory: backend
      - name: Migration dry run (current release to head)
        run: alembic upgrade 20260717_0005:head --sql > migration.sql
        working-directory: backend
      - uses: actions/upload-artifact@v4
        with:
          name: backend-test-and-migration-results
          path: |
            backend/test-results.xml
            backend/migration.sql
      - name: Build backend container
        run: docker build -t nexaread-api:${{ github.sha }} backend
      - name: Scan backend container
        uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: nexaread-api:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run type-check
        working-directory: frontend
      - run: npm test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
        working-directory: frontend

  release-evaluation:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
        working-directory: backend
      - run: python evaluation/run_release_evaluation.py --release ${{ github.sha }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-evaluation
          path: evaluation/reports/
