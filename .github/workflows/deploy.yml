name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      deploy_production:
        description: Deploy the validated revision to production
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  staging:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - name: Check staging configuration
        id: preflight
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_STAGING_PROJECT_ID }}
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
        run: |
          missing=()
          [[ -n "$RAILWAY_TOKEN" ]] || missing+=(RAILWAY_TOKEN)
          [[ -n "$VERCEL_TOKEN" ]] || missing+=(VERCEL_TOKEN)
          [[ -n "$VERCEL_ORG_ID" ]] || missing+=(VERCEL_ORG_ID)
          [[ -n "$VERCEL_PROJECT_ID" ]] || missing+=(VERCEL_STAGING_PROJECT_ID)
          [[ -n "$STAGING_API_URL" ]] || missing+=(STAGING_API_URL)
          if (( ${#missing[@]} > 0 )); then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Staging deploy skipped::Missing configuration: ${missing[*]}"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.preflight.outputs.configured == 'true'
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v4
        if: steps.preflight.outputs.configured == 'true'
        with:
          node-version: "22"
      - name: Deploy backend
        if: steps.preflight.outputs.configured == 'true'
        run: npx @railway/cli@5.27.2 up --service nexaread-backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Wait for migrated backend
        if: steps.preflight.outputs.configured == 'true'
        run: curl --fail --retry 12 --retry-delay 5 "$STAGING_API_URL/health/ready"
        env:
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
      - name: Deploy worker
        if: steps.preflight.outputs.configured == 'true'
        run: npx @railway/cli@5.27.2 up --service nexaread-worker --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Deploy frontend
        if: steps.preflight.outputs.configured == 'true'
        run: npx vercel deploy --prod --token "$VERCEL_TOKEN"
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_STAGING_PROJECT_ID }}
      - name: Staging smoke test
        if: steps.preflight.outputs.configured == 'true'
        run: curl --fail --retry 12 --retry-delay 5 "$STAGING_API_URL/health/ready"
        env:
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}

  production:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_production
    needs: staging
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Validate production configuration
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PRODUCTION_PROJECT_ID }}
          PRODUCTION_API_URL: ${{ vars.PRODUCTION_API_URL }}
        run: |
          missing=()
          [[ -n "$RAILWAY_TOKEN" ]] || missing+=(RAILWAY_TOKEN)
          [[ -n "$VERCEL_TOKEN" ]] || missing+=(VERCEL_TOKEN)
          [[ -n "$VERCEL_ORG_ID" ]] || missing+=(VERCEL_ORG_ID)
          [[ -n "$VERCEL_PROJECT_ID" ]] || missing+=(VERCEL_PRODUCTION_PROJECT_ID)
          [[ -n "$PRODUCTION_API_URL" ]] || missing+=(PRODUCTION_API_URL)
          if (( ${#missing[@]} > 0 )); then
            echo "::error title=Production configuration missing::${missing[*]}"
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Deploy backend
        run: npx @railway/cli@5.27.2 up --service nexaread-backend-production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Wait for migrated backend
        run: curl --fail --retry 12 --retry-delay 5 "$PRODUCTION_API_URL/health/ready"
        env:
          PRODUCTION_API_URL: ${{ vars.PRODUCTION_API_URL }}
      - name: Deploy worker
        run: npx @railway/cli@5.27.2 up --service nexaread-worker-production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Deploy frontend
        run: npx vercel deploy --prod --token "$VERCEL_TOKEN"
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PRODUCTION_PROJECT_ID }}
      - name: Production smoke test
        run: curl --fail --retry 12 --retry-delay 5 "$PRODUCTION_API_URL/health/ready"
        env:
          PRODUCTION_API_URL: ${{ vars.PRODUCTION_API_URL }}