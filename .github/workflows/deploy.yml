name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_production:
        description: Deploy the validated revision to production
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  staging:
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Deploy backend
        run: npx @railway/cli up --service nexaread-backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Wait for migrated backend
        run: curl --fail --retry 12 --retry-delay 5 "$STAGING_API_URL/health/ready"
        env:
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
      - name: Deploy worker
        run: npx @railway/cli up --service nexaread-worker --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Deploy frontend
        run: npx vercel deploy --prod --token "$VERCEL_TOKEN"
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_STAGING_PROJECT_ID }}
      - name: Staging smoke test
        run: curl --fail --retry 12 --retry-delay 5 "$STAGING_API_URL/health/ready"
        env:
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}

  production:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_production
    needs: staging
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Deploy backend
        run: npx @railway/cli up --service nexaread-backend-production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Wait for migrated backend
        run: curl --fail --retry 12 --retry-delay 5 "$PRODUCTION_API_URL/health/ready"
        env:
          PRODUCTION_API_URL: ${{ vars.PRODUCTION_API_URL }}
      - name: Deploy worker
        run: npx @railway/cli up --service nexaread-worker-production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Deploy frontend
        run: npx vercel deploy --prod --token "$VERCEL_TOKEN"
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PRODUCTION_PROJECT_ID }}
      - name: Production smoke test
        run: curl --fail --retry 12 --retry-delay 5 "$PRODUCTION_API_URL/health/ready"
        env:
          PRODUCTION_API_URL: ${{ vars.PRODUCTION_API_URL }}