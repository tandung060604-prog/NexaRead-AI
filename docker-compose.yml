services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexaread}
      POSTGRES_USER: ${POSTGRES_USER:-nexaread}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexaread-dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexaread} -d ${POSTGRES_DB:-nexaread}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-nexaread-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-nexaread-minio-dev}
    ports:
      - "${S3_PORT:-9000}:9000"
      - "${S3_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    image: nexaread-api:local
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_NAME: ${APP_NAME:-NexaRead API}
      SERVICE_NAME: ${SERVICE_NAME:-nexaread-api}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nexaread}:${POSTGRES_PASSWORD:-nexaread-dev}@postgres:5432/${POSTGRES_DB:-nexaread}
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      AUTH_SESSION_HOURS: ${AUTH_SESSION_HOURS:-168}
      AUTH_RATE_LIMIT_PER_MINUTE: ${AUTH_RATE_LIMIT_PER_MINUTE:-10}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-nexaread_session}
      AUTH_CSRF_COOKIE_NAME: ${AUTH_CSRF_COOKIE_NAME:-nexaread_csrf}
      AUTH_IP_HASH_KEY: ${AUTH_IP_HASH_KEY:-}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-nexaread-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-nexaread-minio-dev}
      S3_BUCKET: ${S3_BUCKET:-nexaread-documents}
      S3_REGION: ${S3_REGION:-us-east-1}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      URL_IMPORT_MAX_MB: ${URL_IMPORT_MAX_MB:-10}
      URL_IMPORT_TIMEOUT_SECONDS: ${URL_IMPORT_TIMEOUT_SECONDS:-10}
      URL_IMPORT_MAX_REDIRECTS: ${URL_IMPORT_MAX_REDIRECTS:-3}
      PARSER_TIMEOUT_SECONDS: ${PARSER_TIMEOUT_SECONDS:-60}
      MIN_EXTRACTED_TEXT_CHARACTERS: ${MIN_EXTRACTED_TEXT_CHARACTERS:-20}
      RAG_PROVIDER: ${RAG_PROVIDER:-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-text-embedding-3-small}
      RAG_EMBEDDING_DIMENSIONS: ${RAG_EMBEDDING_DIMENSIONS:-384}
      RAG_ANSWER_MODEL: ${RAG_ANSWER_MODEL:-gpt-5-mini}
      RAG_TOP_K: ${RAG_TOP_K:-8}
      RAG_EVIDENCE_THRESHOLD: ${RAG_EVIDENCE_THRESHOLD:-0.08}
      RAG_PROVIDER_TIMEOUT_SECONDS: ${RAG_PROVIDER_TIMEOUT_SECONDS:-30}
      AI_RATE_LIMIT_PER_MINUTE: ${AI_RATE_LIMIT_PER_MINUTE:-30}
      RAG_RERANK_TIMEOUT_SECONDS: ${RAG_RERANK_TIMEOUT_SECONDS:-0.25}
      RAG_INPUT_COST_PER_MILLION: ${RAG_INPUT_COST_PER_MILLION:-0}
      RAG_OUTPUT_COST_PER_MILLION: ${RAG_OUTPUT_COST_PER_MILLION:-0}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  worker:
    image: nexaread-api:local
    command:
      [
        "dramatiq",
        "app.tasks.document_processing",
        "--processes",
        "1",
        "--threads",
        "1",
      ]
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nexaread}:${POSTGRES_PASSWORD:-nexaread-dev}@postgres:5432/${POSTGRES_DB:-nexaread}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-nexaread-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-nexaread-minio-dev}
      S3_BUCKET: ${S3_BUCKET:-nexaread-documents}
      S3_REGION: ${S3_REGION:-us-east-1}
      MIN_EXTRACTED_TEXT_CHARACTERS: ${MIN_EXTRACTED_TEXT_CHARACTERS:-20}
      PARSER_TIMEOUT_SECONDS: ${PARSER_TIMEOUT_SECONDS:-60}
      RAG_PROVIDER: ${RAG_PROVIDER:-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-text-embedding-3-small}
      RAG_EMBEDDING_DIMENSIONS: ${RAG_EMBEDDING_DIMENSIONS:-384}
      RAG_ANSWER_MODEL: ${RAG_ANSWER_MODEL:-gpt-5-mini}
      RAG_PROVIDER_TIMEOUT_SECONDS: ${RAG_PROVIDER_TIMEOUT_SECONDS:-30}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
