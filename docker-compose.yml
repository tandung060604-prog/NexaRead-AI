services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexaread}
      POSTGRES_USER: ${POSTGRES_USER:-nexaread}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexaread-dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexaread} -d ${POSTGRES_DB:-nexaread}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-nexaread-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-nexaread-minio-dev}
    ports:
      - "${S3_PORT:-9000}:9000"
      - "${S3_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    image: nexaread-api:local
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_NAME: ${APP_NAME:-NexaRead API}
      SERVICE_NAME: ${SERVICE_NAME:-nexaread-api}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nexaread}:${POSTGRES_PASSWORD:-nexaread-dev}@postgres:5432/${POSTGRES_DB:-nexaread}
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DEFAULT_OWNER_ID: ${DEFAULT_OWNER_ID:-local-user}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-nexaread-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-nexaread-minio-dev}
      S3_BUCKET: ${S3_BUCKET:-nexaread-documents}
      S3_REGION: ${S3_REGION:-us-east-1}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      MIN_EXTRACTED_TEXT_CHARACTERS: ${MIN_EXTRACTED_TEXT_CHARACTERS:-20}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  worker:
    image: nexaread-api:local
    command:
      [
        "dramatiq",
        "app.tasks.document_processing",
        "--processes",
        "1",
        "--threads",
        "2",
      ]
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nexaread}:${POSTGRES_PASSWORD:-nexaread-dev}@postgres:5432/${POSTGRES_DB:-nexaread}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-nexaread-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-nexaread-minio-dev}
      S3_BUCKET: ${S3_BUCKET:-nexaread-documents}
      S3_REGION: ${S3_REGION:-us-east-1}
      MIN_EXTRACTED_TEXT_CHARACTERS: ${MIN_EXTRACTED_TEXT_CHARACTERS:-20}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
